<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Catalog Store</title>
    <!-- Tailwind CSS for Professional Responsive UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Telegram WebApp Core JS Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .no-copy {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans pb-12">

    <!-- Sticky Navigation App Bar -->
    <header class="bg-white/95 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 px-4 py-3.5 flex items-center justify-between shadow-xs">
        <div class="flex items-center space-x-3">
            <button id="backBtn" class="hidden text-slate-600 hover:text-slate-900 mr-1 cursor-pointer" onclick="showMainPage()">
                <i class="fa-solid fa-chevron-left text-lg font-bold"></i>
            </button>
            <h1 id="appTitle" class="text-lg font-extrabold text-slate-900 tracking-tight">Zain Products Store</h1>
        </div>
        <span class="text-xs bg-indigo-50 text-indigo-700 font-semibold px-3 py-1 rounded-full border border-indigo-100" id="productCount">0 Items</span>
    </header>

    <!-- Main Catalog Interface Grid -->
    <main id="mainPage" class="p-4 max-w-4xl mx-auto">
        <!-- Live Search Field -->
        <div class="mb-5">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="filterProducts()" placeholder="Search by ASIN, Title, or Category..." class="w-full bg-white border border-slate-200 rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-xs transition-all">
            </div>
        </div>

        <!-- Dynamic Storefront Products Grid Layout -->
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div class="col-span-full text-center py-20 text-slate-400 font-medium text-sm">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2 text-indigo-500 block"></i>
                Loading Products Live from Google Sheet via Safe JSON...
            </div>
        </div>
    </main>

    <!-- Hierarchical Product Isolated Detail View -->
    <section id="detailPage" class="hidden p-4 max-w-2xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xs border border-slate-100 overflow-hidden">
            
            <!-- Photos Section: Handles Comma-Separated Links Seamlessly -->
            <div class="relative bg-slate-100 p-4 min-h-[300px] flex flex-col items-center justify-center">
                <button id="prevImgBtn" onclick="changeImage(-1)" class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/80 p-2.5 rounded-full shadow-md text-slate-700 z-10 hover:bg-white cursor-pointer transition">
                    <i class="fa-solid fa-angle-left"></i>
                </button>
                
                <img id="detailImage" src="" alt="Product Showcase" class="max-h-80 object-contain rounded-xl transition-all duration-300">
                
                <button id="nextImgBtn" onclick="changeImage(1)" class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/80 p-2.5 rounded-full shadow-md text-slate-700 z-10 hover:bg-white cursor-pointer transition">
                    <i class="fa-solid fa-angle-right"></i>
                </button>

                <div class="absolute bottom-4 left-4 right-4 flex justify-between items-center">
                    <span id="imageCounter" class="bg-slate-900/60 text-white text-[11px] font-medium px-2.5 py-1 rounded-full backdrop-blur-xs">1/1</span>
                    <a id="downloadBtn" href="" download="product_image.jpg" target="_blank" class="bg-white text-slate-800 px-3.5 py-2 rounded-xl shadow-md hover:bg-slate-50 transition flex items-center gap-2 font-bold text-xs cursor-pointer">
                        <i class="fa-solid fa-download text-indigo-600"></i> Download Photo
                    </a>
                </div>
            </div>

            <!-- Descriptive Text Data Fields Area -->
            <div class="p-5">
                <span id="detailCategory" class="inline-block bg-indigo-50 border border-indigo-100 text-indigo-700 text-[10px] font-bold tracking-wider uppercase px-2.5 py-1 rounded-md mb-3 select-text"></span>
                
                <h2 id="detailTitle" class="text-lg font-bold text-slate-900 leading-snug mb-1.5 select-text"></h2>
                
                <div class="flex items-center gap-2 mb-5 text-xs text-slate-500">
                    <span class="font-semibold text-slate-400">ASIN:</span>
                    <span id="detailAsin" class="bg-slate-100 px-2.5 py-1 rounded-md font-mono text-xs select-all text-slate-700 font-medium"></span>
                </div>

                <hr class="border-slate-100 my-4">

                <!-- Mathematical Price Breakdown Block -->
                <div class="bg-gradient-to-br from-amber-50 to-amber-50/20 border border-amber-200/60 rounded-xl p-4 mb-5 no-copy">
                    <h3 class="text-[11px] font-bold uppercase tracking-wider text-amber-800 mb-3"><i class="fa-solid fa-calculator mr-1.5"></i> Price Calculation</h3>
                    <div class="space-y-2.5 text-sm text-slate-700">
                        <div class="flex justify-between">
                            <span class="text-slate-500">Original Price:</span>
                            <span class="font-semibold text-slate-900" id="priceOriginal">PKR 0</span>
                        </div>
                        <div class="flex justify-between text-emerald-600 font-semibold text-xs bg-emerald-50 px-2 py-0.5 rounded">
                            <span>Discount:</span>
                            <span id="priceDiscountPct">0%</span>
                        </div>
                        <div class="flex justify-between border-b border-dashed border-slate-200 pb-2">
                            <span class="text-slate-600 font-medium">Discounted Price:</span>
                            <span class="font-bold text-slate-900" id="priceDiscounted">PKR 0</span>
                        </div>
                        <div class="flex justify-between pt-1">
                            <span class="text-slate-500">FBR TAX (2%):</span>
                            <span class="font-medium text-slate-900" id="priceTax">PKR 0</span>
                        </div>
                        <div class="flex justify-between border-b border-slate-100 pb-2">
                            <span class="text-slate-500">Packaging and Labeling:</span>
                            <span class="font-medium text-slate-900" id="pricePackaging">PKR 40</span>
                        </div>
                        <div class="flex justify-between pt-2.5 text-base font-extrabold text-slate-900">
                            <span>Total:</span>
                            <span class="text-indigo-600 text-lg font-black" id="priceTotal">PKR 0</span>
                        </div>
                    </div>
                </div>

                <hr class="border-slate-100 my-4">

                <!-- Long-Form Text Description Element -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Product Description</h3>
                    <div id="detailDescription" class="text-slate-600 text-sm leading-relaxed select-text bg-slate-50 p-3.5 rounded-xl border border-slate-100 overflow-x-auto"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript Execution Engine -->
    <script>
        const tgApp = window.Telegram?.WebApp;
        if (tgApp) { tgApp.expand(); tgApp.ready(); }

        let productsInventory = [];
        let activeDataset = [];
        let currentImageArray = [];
        let currentImageIdx = 0;

        // ⚠️ APNI GOOGLE SHEET ID REPLACE KAREIN
        const GOOGLE_SHEET_ID = 'YOUR_GOOGLE_SHEET_ID_HERE';
        // Safe JSON API endpoint for robust description parsing
        const SHEET_JSON_URL = `https://docs.google.com/spreadsheets/d/1v5Yc4XsFG548Zwn8L9Zl_BAqNaUIEtntDo2JGsBxYn0/gviz/tq?tqx=out:json`;

        async function loadGoogleSheetInventory() {
            try {
                const res = await fetch(SHEET_JSON_URL);
                if(!res.ok) throw new Error("Fetch failed");
                const text = await res.text();
                
                // Pure JSON structural extraction bypassing line break crashes
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const jsonData = JSON.parse(jsonString);
                
                const rows = jsonData.table.rows;
                const cols = jsonData.table.cols.map(c => c.label.trim());

                productsInventory = rows.map(row => {
                    let item = {};
                    row.c.forEach((cell, index) => {
                        let colName = cols[index];
                        if(colName) {
                            item[colName] = cell ? (cell.v !== null ? cell.v : '') : '';
                        }
                    });
                    return item;
                });

                activeDataset = [...productsInventory];
                document.getElementById('productCount').innerText = `${productsInventory.length} Available`;
                renderMasterCatalog(activeDataset);
            } catch (err) {
                console.error("Critical Engine Error:", err);
                document.getElementById('productsGrid').innerHTML = `
                    <div class="col-span-full text-center py-20 text-red-500 font-medium text-sm">
                        <i class="fa-solid fa-triangle-exclamation block text-3xl mb-2"></i>
                        Data parse karne mein masla aya! Sheet ID check karein aur confirm karein Headers pehli row mein hain.
                    </div>`;
            }
        }

        function renderMasterCatalog(items) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-16 text-slate-400 text-sm">No items matching current search terms.</div>`;
                return;
            }

            items.forEach(item => {
                const photoLinks = item.Images ? String(item.Images).split(',') : [];
                const thumbnail = photoLinks[0] ? photoLinks[0].trim() : 'https://placehold.co/300?text=No+Photo';

                const origPrice = Number(item.price || 0);
                const discPct = Number(item.discount || 0);
                const netDisc = origPrice - ((origPrice * discPct) / 100);
                const tax = Math.round(netDisc * 0.02);
                const grandTotal = Math.round(netDisc + tax + 40);

                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200/80 rounded-xl overflow-hidden cursor-pointer hover:border-indigo-400 transition flex flex-col justify-between shadow-2xs";
                card.onclick = () => instantiateDetailRoute(item);

                card.innerHTML = `
                    <div class="p-3 bg-slate-50 flex items-center justify-center aspect-square border-b border-slate-100">
                        <img src="${thumbnail}" alt="Thumb" class="max-h-full max-w-full object-contain rounded-md">
                    </div>
                    <div class="p-3 flex-1 flex flex-col justify-between">
                        <div>
                            <span class="text-[9px] font-extrabold uppercase tracking-wider text-slate-400 block mb-1">${item.Categories || 'General'}</span>
                            <h3 class="text-xs font-bold text-slate-800 line-clamp-2 leading-tight">${item.Title || 'No Title'}</h3>
                        </div>
                        <div class="mt-2 pt-2 border-t border-slate-100 flex items-baseline justify-between no-copy">
                            <span class="text-[10px] text-slate-400 line-through">PKR ${origPrice}</span>
                            <span class="text-xs font-black text-indigo-600">PKR ${grandTotal}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            activeDataset = productsInventory.filter(p => 
                String(p.Title).toLowerCase().includes(query) ||
                String(p.ASIN).toLowerCase().includes(query) ||
                String(p.Categories).toLowerCase().includes(query)
            );
            renderMasterCatalog(activeDataset);
        }

        function instantiateDetailRoute(product) {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('detailPage').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');
            document.getElementById('appTitle').innerText = "Product Portfolio";

            currentImageArray = product.Images ? String(product.Images).split(',').map(url => url.trim()) : [];
            if(currentImageArray.length === 0) currentImageArray.push('https://placehold.co/400?text=No+Photo');
            currentImageIdx = 0;
            updateSliderUI();

            document.getElementById('detailCategory').innerText = product.Categories || 'General';
            document.getElementById('detailTitle').innerText = product.Title || 'No Title';
            document.getElementById('detailAsin').innerText = product.ASIN || 'N/A';
            
            // Safely injection of rich HTML content description
            document.getElementById('detailDescription').innerHTML = product.Description || 'No description available.';

            const baseOriginal = Number(product.price || 0);
            const discountValue = Number(product.discount || 0);
            const subtotalDiscounted = baseOriginal - ((baseOriginal * discountValue) / 100);
            const computedTax = Math.round(subtotalDiscounted * 0.02);
            const packagingFee = 40;
            const absoluteSumTotal = Math.round(subtotalDiscounted + computedTax + packagingFee);

            document.getElementById('priceOriginal').innerText = `PKR ${baseOriginal}`;
            document.getElementById('priceDiscountPct').innerText = `${discountValue}% Off`;
            document.getElementById('priceDiscounted').innerText = `PKR ${subtotalDiscounted}`;
            document.getElementById('priceTax').innerText = `PKR ${computedTax}`;
            document.getElementById('pricePackaging').innerText = `PKR ${packagingFee}`;
            document.getElementById('priceTotal').innerText = `PKR ${absoluteSumTotal}`;

            window.scrollTo(0, 0);
        }

        function updateSliderUI() {
            const activeImg = currentImageArray[currentImageIdx];
            document.getElementById('detailImage').src = activeImg;
            document.getElementById('downloadBtn').href = activeImg;
            document.getElementById('imageCounter').innerText = `${currentImageIdx + 1}/${currentImageArray.length}`;

            document.getElementById('prevImgBtn').style.display = currentImageArray.length > 1 ? 'block' : 'none';
            document.getElementById('nextImgBtn').style.display = currentImageArray.length > 1 ? 'block' : 'none';
        }

        function changeImage(dir) {
            currentImageIdx += dir;
            if (currentImageIdx >= currentImageArray.length) currentImageIdx = 0;
            if (currentImageIdx < 0) currentImageIdx = currentImageArray.length - 1;
            updateSliderUI();
        }

        function showMainPage() {
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('detailPage').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            document.getElementById('appTitle').innerText = "Zain Products Store";
        }

        loadGoogleSheetInventory();
    </script>
</body>
</html>
